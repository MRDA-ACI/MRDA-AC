<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Profile</title>

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f2f4ff;
}

/* HEADER */

.header{
  height:170px;
  background:url('school.jpg') center/cover no-repeat;
  position:relative;
  transition:0.3s;
}

.header.shrink{
  height:90px;
}

/* MENU BUTTON */

.menu-btn{
  position:absolute;
  top:15px;
  left:15px;
  font-size:28px;
  color:white;
  cursor:pointer;
}

/* SCHOOL INFO */

.school-box{
  position:relative;
  background:white;
  width:80%;
  margin:-20px auto 10px auto;
  padding:5px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
  display:flex;
  align-items:center;
  gap:15px;
}

.logo{
  width:50px;
}

.school-box h2{
  margin:0;
  font-size:16px;
}

/* CONTENT AREA */

.feed{
  padding:15px;
  padding-bottom:120px;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* LOGOUT CARD */

.profile-card{
  background:white;
  width:100%;
  max-width:400px;
  padding:30px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.logout-btn{
  background:#ff4d4d;
  color:white;
  border:none;
  padding:14px;
  border-radius:12px;
  width:100%;
  font-size:16px;
  cursor:pointer;
}

.logout-btn:hover{
  background:#e60000;
}

/* NAVBAR */

.navbar{
  position:fixed;
  bottom:0;
  width:100%;
  height:75px;
  background:white;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid #ddd;
}

.navbar button{
  background:none;
  border:none;
  color:#555;
  font-size:11px;
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
}

.navbar button span{
  font-size:24px;
}

.navbar .active{
  color:#1e3cff;
}

/* SIDE MENU */

.side-menu{
  position:fixed;
  top:0;
  left:-260px;
  width:250px;
  height:100%;
  background:white;
  box-shadow:3px 0 10px rgba(0,0,0,0.2);
  padding-top:60px;
  transition:0.3s;
  z-index:1000;
}

.side-menu a{
  display:block;
  padding:15px 20px;
  text-decoration:none;
  color:#333;
  border-bottom:1px solid #eee;
}

.side-menu a.active{
  background:#e8ecff;
  font-weight:bold;
  color:#1e3cff;
}

.side-menu a:hover{
  background:#f2f4ff;
}

.side-menu.open{
  left:0;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.3);
  display:none;
}

.overlay.show{
  display:block;
}

</style>
</head>

<body>

<!-- SIDE MENU -->

<div class="side-menu" id="sideMenu">
  <a href="history.html">🏫 School History</a>
  <a href="policy.html">📜 Policy</a>
  <a href="admin.html">👔 School Admin</a>
  <a href="teachers.html">👩‍🏫 Teachers</a>
  <a href="students.html">🎓 Students</a>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- HEADER -->

<div class="header" id="header">
  <div class="menu-btn" onclick="openMenu()">☰</div>
</div>

<!-- SCHOOL INFO -->

<div class="school-box">
  <img src="logo.png" class="logo">
  <h2>MRDA Academic Center Inc.</h2>
</div>

<!-- PROFILE CONTENT -->

<div class="feed">

<div class="profile-card">

<h3>Student Account</h3>

<p>You are currently logged in.</p>

<button class="logout-btn" onclick="logout()">Logout</button>

</div>

</div>

<!-- NAVBAR -->

<div class="navbar">

<button onclick="go('timer.html')">
<span>⏱️</span>
Study Timer
</button>

<button onclick="go('calendar.html')">
<span>📅</span>
Calendar
</button>

<button onclick="go('student-home.html')">
<span>🏠</span>
Home
</button>

<button onclick="go('notepad.html')">
<span>📝</span>
Notepad
</button>

<button class="active" onclick="go('profile.html')">
<span>👤</span>
Profile
</button>

</div>

<script>

/* LOGOUT FUNCTION */

function logout(){

localStorage.removeItem("mrda_logged_in");

window.location.href = "index.html";

}

/* MENU */

function openMenu(){
document.getElementById("sideMenu").classList.add("open");
document.getElementById("overlay").classList.add("show");
}

function closeMenu(){
document.getElementById("sideMenu").classList.remove("open");
document.getElementById("overlay").classList.remove("show");
}

function go(page){
window.location.href = page;
}

/* SHRINK HEADER */

window.addEventListener("scroll", function(){

if(window.scrollY > 50){
document.getElementById("header").classList.add("shrink");
}
else{
document.getElementById("header").classList.remove("shrink");
}

});

</script>

</body>
</html>
